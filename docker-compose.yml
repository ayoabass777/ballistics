services:
  postgres:
    image: postgres:latest
    container_name: ballistics_postgres
    env_file: .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - etl_network

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: ballistics_airflow_init
    image: ballistics-airflow:latest
    env_file: .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@ballistics.dev --password $${AIRFLOW__WEBSERVER__DEFAULT_USER_PASSWORD}"
    networks:
      - etl_network

  airflow-webserver:
    image: ballistics-airflow:latest
    pull_policy: never
    container_name: ballistics_airflow_webserver
    env_file: .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./data:/opt/airflow/data
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - etl_network
    command: ["airflow", "webserver"]

  airflow-scheduler:
    image: ballistics-airflow:latest
    pull_policy: never
    container_name: ballistics_airflow_scheduler
    env_file: .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    depends_on:
      - airflow-webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./data:/opt/airflow/data
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - etl_network
    command: ["airflow", "scheduler"]

  dbt:
    build: ./dbt
    container_name: ballistics_dbt
    image: ballistics-dbt:latest
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etl_network

volumes:
  pg_data:

networks:
  etl_network:
    name: ballistics_network
